<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gradDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#86868b"/>
    </marker>
  </defs>

  <rect width="1000" height="760" fill="#f5f5f7"/>

  <text x="40" y="42" font-size="26" font-weight="800" fill="#1d1d1f">Sampoorna Claims Assistant — Architecture</text>
  <rect x="40" y="54" width="40" height="4" rx="2" fill="url(#grad)"/>

  <!-- Channel layer -->
  <rect x="40" y="80" width="920" height="60" rx="18" fill="#ffffff" stroke="#e2e2e6"/>
  <text x="60" y="105" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">CHANNEL LAYER</text>
  <text x="60" y="126" font-size="13" fill="#52525b">Insurer app UI (vanilla JS) — Home → Call screen → simulated-SMS → upload screen → back to call</text>

  <line x1="500" y1="140" x2="500" y2="168" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Voice IO layer -->
  <rect x="40" y="170" width="920" height="70" rx="18" fill="#ffffff" stroke="#e2e2e6"/>
  <rect x="40" y="170" width="920" height="4" rx="2" fill="url(#grad)"/>
  <text x="60" y="196" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">VOICE I/O LAYER</text>
  <text x="60" y="218" font-size="13" fill="#52525b">Saaras (STT, auto-detect language + code-mix) → transcript      Bulbul (TTS) → spoken reply</text>
  <rect x="700" y="184" width="80" height="24" rx="12" fill="#eef2ff" stroke="#e0e7ff"/>
  <text x="740" y="200" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">Saaras</text>
  <rect x="800" y="184" width="80" height="24" rx="12" fill="#eef2ff" stroke="#e0e7ff"/>
  <text x="840" y="200" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">Bulbul</text>

  <line x1="500" y1="240" x2="500" y2="268" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestration layer -->
  <rect x="40" y="270" width="920" height="80" rx="18" fill="url(#gradDeep)"/>
  <text x="60" y="296" font-size="11" font-weight="700" letter-spacing="1" fill="#ffffff">ORCHESTRATION LAYER — orchestrator.py</text>
  <text x="60" y="320" font-size="13" fill="rgba(255,255,255,0.9)">Sarvam-105B tool-calling (cheap, ~50-150 tokens) picks a tool → Python executes it deterministically</text>
  <text x="60" y="340" font-size="13" fill="rgba(255,255,255,0.9)">→ fast-path: Sarvam-Translate localizes the retrieved fact (skips the reasoning-render tax)</text>

  <line x1="200" y1="350" x2="200" y2="380" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="350" x2="500" y2="380" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="350" x2="800" y2="380" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Three columns: Intelligence, Knowledge, Document -->
  <rect x="40" y="382" width="280" height="150" rx="18" fill="#ffffff" stroke="#e2e2e6"/>
  <text x="60" y="408" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">INTELLIGENCE LAYER</text>
  <text x="60" y="432" font-size="13" fill="#1d1d1f" font-weight="600">Sarvam-105B</text>
  <text x="60" y="452" font-size="12.5" fill="#52525b">- intent + tool selection</text>
  <text x="60" y="470" font-size="12.5" fill="#52525b">- never invents facts</text>
  <text x="60" y="488" font-size="12.5" fill="#52525b">Sarvam-Translate</text>
  <text x="60" y="506" font-size="12.5" fill="#52525b">- renders retrieved facts</text>

  <rect x="360" y="382" width="280" height="150" rx="18" fill="#ffffff" stroke="#e2e2e6"/>
  <text x="380" y="408" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">KNOWLEDGE &amp; DATA</text>
  <text x="380" y="432" font-size="13" fill="#1d1d1f" font-weight="600">knowledge.py</text>
  <text x="380" y="452" font-size="12.5" fill="#52525b">- claims.json (mock claims)</text>
  <text x="380" y="470" font-size="12.5" fill="#52525b">- policy_kb / cashless_faq</text>
  <text x="380" y="488" font-size="12.5" fill="#52525b">- denial_templates.json</text>
  <text x="380" y="506" font-size="12.5" fill="#52525b">- document_checklist.json</text>

  <rect x="680" y="382" width="280" height="150" rx="18" fill="#ffffff" stroke="#e2e2e6"/>
  <text x="700" y="408" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">DOCUMENT LAYER</text>
  <text x="700" y="432" font-size="13" fill="#1d1d1f" font-weight="600">Sarvam Vision</text>
  <text x="700" y="452" font-size="12.5" fill="#52525b">- doc-digitization job</text>
  <text x="700" y="470" font-size="12.5" fill="#52525b">- OCR → Markdown text</text>
  <text x="700" y="488" font-size="12.5" fill="#52525b">- LLM classifies doc type</text>
  <text x="700" y="506" font-size="12.5" fill="#52525b">- completeness check</text>

  <line x1="500" y1="532" x2="500" y2="560" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Escalation & audit -->
  <rect x="40" y="562" width="920" height="90" rx="18" fill="#ffffff" stroke="#e2e2e6"/>
  <rect x="40" y="562" width="920" height="4" rx="2" fill="url(#grad)"/>
  <text x="60" y="588" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">ESCALATION &amp; AUDIT LAYER (cross-cutting)</text>
  <text x="60" y="610" font-size="13" fill="#52525b">Immediate triggers (denial, human request, distress) + 2-failed-attempt catch-all → create_grievance_case</text>
  <text x="60" y="630" font-size="13" fill="#52525b">Every turn appended to an audit log (JSON-file session storage) → GET /audit/:session_id, GET /metrics</text>

  <!-- Legend / moments -->
  <text x="40" y="690" font-size="11" font-weight="700" letter-spacing="1" fill="#4b5563">THREE DEMO MOMENTS TRACED THROUGH THIS STACK</text>
  <rect x="40" y="702" width="290" height="46" rx="14" fill="#eef2ff" stroke="#e0e7ff"/>
  <text x="56" y="722" font-size="12" font-weight="700" fill="#3730a3">1. Cashless guidance</text>
  <text x="56" y="740" font-size="11" fill="#4338ca">STT → tools → FAQ/policy → TTS</text>

  <rect x="355" y="702" width="290" height="46" rx="14" fill="#eef2ff" stroke="#e0e7ff"/>
  <text x="371" y="722" font-size="12" font-weight="700" fill="#3730a3">2. Reimbursement docs</text>
  <text x="371" y="740" font-size="11" fill="#4338ca">+ Vision OCR → completeness</text>

  <rect x="670" y="702" width="290" height="46" rx="14" fill="#eef2ff" stroke="#e0e7ff"/>
  <text x="686" y="722" font-size="12" font-weight="700" fill="#3730a3">3. Denial → grievance</text>
  <text x="686" y="740" font-size="11" fill="#4338ca">+ escalation → human handoff</text>
</svg>
