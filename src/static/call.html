<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Call — Sampoorna Health Secure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/design.css">
<style>
  .call-page { display: flex; flex-direction: column; min-height: 100vh; }
  .call-top { display: flex; justify-content: space-between; align-items: center; }
  .status-chip { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .gate-card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; margin-top: 22px; }
  .gate-card .icon { font-size: 40px; margin-bottom: 6px; }

  .transcript-card { flex: 1; margin-top: 22px; display: flex; flex-direction: column; gap: 12px; min-height: 320px; max-height: 42vh; overflow-y: auto; }
  .bubble { max-width: 84%; padding: 12px 16px; border-radius: 16px; font: 400 14px/1.45 "DM Sans", sans-serif; }
  .bubble.caller { align-self: flex-end; background: #eef2ff; color: #1d1d1f; border-bottom-right-radius: 4px; }
  .bubble.assistant { align-self: flex-start; background: #f5f5f7; color: #1d1d1f; border-bottom-left-radius: 4px; }
  .bubble.live { align-self: flex-end; background: #eef2ff; color: #4338ca; border-bottom-right-radius: 4px; opacity: 0.8; font-style: italic; }
  .bubble .who { font: 600 10.5px "DM Sans", sans-serif; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; display: block; }
  .bubble .source-tag { font: 500 11px "DM Sans", sans-serif; color: var(--text-muted); margin-top: 6px; display: block; }

  .state-banner {
    text-align: center; padding: 9px 14px; border-radius: 100px; font: 600 12.5px "DM Sans", sans-serif;
    margin: 12px auto 0; display: inline-block; align-self: center;
  }
  .state-banner.listening { background: #eef2ff; color: var(--indigo-ink); }
  .state-banner.wait { background: #fffbeb; color: #78350f; }
  .state-banner.speaking { background: #f0fdf4; color: #14532d; }

  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 18px 0 8px; }
  .mic-btn {
    width: 84px; height: 84px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--gradient-primary); color: #fff; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(37,99,235,0.35);
    transition: opacity 0.2s;
  }
  .mic-btn.listening { animation: pulse-ring 1.2s infinite; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); } 100% { box-shadow: 0 0 0 16px rgba(37,99,235,0); } }
  .mic-btn.inert { background: #d1d5db; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
  .mic-hint { font: 500 13px "DM Sans", sans-serif; color: var(--text-muted); text-align: center; max-width: 300px; }

  .processing-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .dot-flash { display: inline-flex; gap: 4px; }
  .dot-flash span { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: flash 1s infinite; }
  .dot-flash span:nth-child(2) { animation-delay: 0.2s; }
  .dot-flash span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes flash { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  .sms-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%);
    background: #1d1d1f; color: #fff; padding: 14px 18px; border-radius: 16px;
    display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transition: transform 0.3s ease; max-width: 90vw; z-index: 10;
  }
  .sms-toast.show { transform: translateX(-50%) translateY(0); }
  .sms-toast a { color: #93c5fd; font-weight: 700; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="page call-page">
  <div class="call-top">
    <div class="logo-lockup" id="logo"></div>
    <div class="status-chip">
      <span class="dot connecting" id="statusDot"></span>
      <span class="pill" id="langChip">Detecting…</span>
    </div>
  </div>

  <div class="card gate-card" id="gateCard">
    <div class="tick"></div>
    <div class="icon">&#128222;</div>
    <h2 class="section-title" style="font-size:22px;">Ready when you are</h2>
    <p class="lead">Tap to start the call. The assistant will introduce itself, then beep — after that, just speak naturally. It will know when you're done.</p>
    <button class="btn-primary" id="startCallBtn" style="margin-top:10px;">Start call</button>
  </div>

  <div class="card transcript-card hidden" id="transcriptCard"></div>
  <span class="state-banner hidden" id="stateBanner"></span>

  <div class="mic-area hidden" id="micArea">
    <button class="mic-btn inert" id="micBtn">&#127908;</button>
    <div class="mic-hint" id="micHint">Getting ready…</div>
  </div>
</div>

<div class="sms-toast" id="smsToast">
  <span>&#128231; New message: documents needed for your claim.</span>
  <a href="#" id="smsLink">Open</a>
</div>

<script src="/static/js/logo.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/mic.js"></script>
<script src="/static/js/livecaption.js"></script>
<script src="/static/js/beep.js"></script>
<script>
  renderSarvamLogo(document.getElementById("logo"));

  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");
  if (!sessionId) window.location.href = "/static/index.html";

  const statusDot = document.getElementById("statusDot");
  const langChip = document.getElementById("langChip");
  const gateCard = document.getElementById("gateCard");
  const transcriptCard = document.getElementById("transcriptCard");
  const stateBanner = document.getElementById("stateBanner");
  const micArea = document.getElementById("micArea");
  const startCallBtn = document.getElementById("startCallBtn");
  const micBtn = document.getElementById("micBtn");
  const micHint = document.getElementById("micHint");
  const smsToast = document.getElementById("smsToast");
  const smsLink = document.getElementById("smsLink");

  let liveBubble = null;
  let liveText = "";
  let ended = false; // guards against double-firing (VAD event + manual tap)
  let fillerAudioBase64 = null; // cached "let me check that" clip, played instantly on speech-end

  statusDot.classList.remove("connecting");

  const SOURCE_LABELS = {
    get_claim_status: "claim record",
    get_cashless_status: "claim record",
    get_denial_reason: "claim record",
    check_document_completeness: "claim record",
    send_document_upload_link: "claim record",
    get_policy_clause: "policy knowledge base",
  };

  function sourceCaption(source) {
    if (!source) return "";
    const label = SOURCE_LABELS[source.tool];
    if (!label) return "";
    const suffix = source.claim_id ? ` ${source.claim_id}` : "";
    return `<span class="source-tag">Sourced from ${label}${suffix}</span>`;
  }

  function addBubble(who, text, source) {
    const div = document.createElement("div");
    div.className = `bubble ${who === "caller" ? "caller" : "assistant"}`;
    div.innerHTML = `<span class="who">${who === "caller" ? "You" : "Health Secure Assistant"}</span>${text}${sourceCaption(source)}`;
    transcriptCard.appendChild(div);
    transcriptCard.scrollTop = transcriptCard.scrollHeight;
    return div;
  }

  function setState(kind, text) {
    stateBanner.className = `state-banner ${kind}`;
    stateBanner.textContent = text;
  }

  function setMicInert(hint) {
    micBtn.classList.remove("listening");
    micBtn.classList.add("inert");
    micHint.textContent = hint;
  }

  function setMicListening() {
    micBtn.classList.add("listening");
    micBtn.classList.remove("inert");
    micHint.textContent = "Listening — speak naturally. Tap the mic only if you want to stop early.";
  }

  function showSmsToast() {
    smsToast.classList.add("show");
    smsLink.href = `/static/upload.html?session_id=${sessionId}`;
  }

  async function recoverFromMissingSession() {
    setState("wait", "Starting a fresh session…");
    setMicInert("This link had expired — starting a new call.");
    const s = await Api.createSession();
    window.location.href = `/static/call.html?session_id=${s.session_id}`;
  }

  async function startCall() {
    gateCard.classList.add("hidden");
    transcriptCard.classList.remove("hidden");
    stateBanner.classList.remove("hidden");
    micArea.classList.remove("hidden");
    setState("wait", "The assistant is introducing itself…");
    setMicInert("Please wait — introduction in progress.");

    let intro;
    try {
      intro = await Api.getIntro(sessionId);
    } catch (err) {
      if (err.isSessionMissing) {
        await recoverFromMissingSession();
      } else {
        setState("wait", "Something went wrong");
        setMicInert("Please reload the page to try again.");
      }
      return;
    }
    fillerAudioBase64 = intro.filler_audio || null;
    addBubble("assistant", intro.assistant_text);
    await playAudioBase64Async(intro.assistant_audio);
    await playBeep();
    startListening();
  }

  // Returning from the document-upload screen (upload.html) should continue the
  // same call, not replay the full intro as if it were a brand new one - the OCR
  // verdict was already spoken there, so we just surface it in the transcript and
  // go straight back to listening.
  async function resumeCall() {
    gateCard.classList.add("hidden");
    transcriptCard.classList.remove("hidden");
    stateBanner.classList.remove("hidden");
    micArea.classList.remove("hidden");
    setState("wait", "Reconnecting to your call…");
    setMicInert("Please wait…");

    try {
      const [status, audit] = await Promise.all([Api.getSessionStatus(sessionId), Api.getAudit(sessionId)]);
      if (status.language_override || status.language) {
        langChip.textContent = languageLabel(status.language_override || status.language);
      }
      const docEvent = (audit.audit_log || []).slice().reverse().find((e) => e.event === "document_upload");
      if (docEvent) addBubble("assistant", docEvent.assistant_text);
    } catch (err) {
      if (err.isSessionMissing) {
        await recoverFromMissingSession();
        return;
      }
    }

    await playBeep();
    startListening();
  }

  function onLiveTranscript(text) {
    liveText = (liveText + " " + text).trim();
    if (!liveBubble) {
      liveBubble = document.createElement("div");
      liveBubble.className = "bubble live";
      transcriptCard.appendChild(liveBubble);
    }
    liveBubble.innerHTML = `<span class="who">Listening…</span>${liveText}`;
    transcriptCard.scrollTop = transcriptCard.scrollHeight;
  }

  async function startListening() {
    ended = false;
    liveText = "";
    liveBubble = null;
    setState("listening", "Listening…");

    let micStream;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      setState("wait", "Microphone access needed");
      setMicInert("Microphone access is needed. Please allow it and reload.");
      return;
    }

    const chunks = [];
    const mediaRecorder = new MediaRecorder(micStream);
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    mediaRecorder.start();

    const captioner = new LiveCaptioner(onLiveTranscript, onEndSpeech);
    captioner.start(micStream);

    setMicListening();

    async function onEndSpeech() {
      if (ended) return;
      ended = true;
      setMicInert("Got it — processing what you said. No need to press anything.");
      setState("wait", "Got it — one moment…");
      await playBeep();
      captioner.stop();

      const blob = await new Promise((resolve) => {
        mediaRecorder.onstop = () => resolve(new Blob(chunks, { type: "audio/webm" }));
        mediaRecorder.stop();
      });
      micStream.getTracks().forEach((t) => t.stop());

      setState("wait", "Looking into your question…");
      micHint.innerHTML = `<span class="processing-row">Please wait, I'm looking into that<span class="dot-flash"><span></span><span></span><span></span></span></span>`;

      // Fire the network call and the cached "let me check that" filler in parallel -
      // the caller hears an immediate acknowledgement instead of dead air while the
      // real lookup is still in flight.
      const turnPromise = Api.sendTurn(sessionId, blob);
      if (fillerAudioBase64) {
        await playAudioBase64Async(fillerAudioBase64);
      }

      let result;
      try {
        result = await turnPromise;
      } catch (err) {
        if (err.isSessionMissing) {
          await recoverFromMissingSession();
          return;
        }
        setState("wait", "Something went wrong");
        setMicInert("Please tap the mic to try again.");
        micBtn.classList.remove("inert");
        micBtn.onclick = () => startListening();
        return;
      }
      await handleTurnResult(result);
    }

    micBtn.onclick = () => onEndSpeech();
  }

  async function handleTurnResult(result) {
    langChip.textContent = languageLabel(result.detected_language);
    if (liveBubble) {
      liveBubble.remove();
      liveBubble = null;
    }
    if (result.filler_audio) fillerAudioBase64 = result.filler_audio;
    if (result.transcript) addBubble("caller", result.transcript);
    addBubble("assistant", result.assistant_text, result.source);
    setState("speaking", "The assistant is replying…");
    setMicInert("Please wait — the assistant is speaking.");
    await playAudioBase64Async(result.assistant_audio);

    if (result.action === "REQUEST_DOCUMENT") {
      showSmsToast();
      setState("wait", "Waiting for your document upload…");
      setMicInert("Open the message below to upload your document.");
      return;
    }
    if (result.action === "ESCALATE") {
      setState("wait", "Connecting you to an agent…");
      setTimeout(() => {
        window.location.href = `/static/escalation.html?session_id=${sessionId}`;
      }, 800);
      return;
    }
    await playBeep();
    startListening();
  }

  if (params.get("resume") === "1") {
    resumeCall();
  } else {
    startCallBtn.addEventListener("click", startCall);
  }
</script>
</body>
</html>
