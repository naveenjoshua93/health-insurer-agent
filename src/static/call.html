<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Call — Sampoorna Health Secure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/design.css">
<style>
  .call-page { display: flex; flex-direction: column; min-height: 100vh; }
  .call-top { display: flex; justify-content: space-between; align-items: center; }
  .status-chip { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .transcript-card { flex: 1; margin-top: 22px; display: flex; flex-direction: column; gap: 12px; min-height: 320px; max-height: 50vh; overflow-y: auto; }
  .bubble { max-width: 84%; padding: 12px 16px; border-radius: 16px; font: 400 14px/1.45 "DM Sans", sans-serif; }
  .bubble.caller { align-self: flex-end; background: #eef2ff; color: #1d1d1f; border-bottom-right-radius: 4px; }
  .bubble.assistant { align-self: flex-start; background: #f5f5f7; color: #1d1d1f; border-bottom-left-radius: 4px; }
  .bubble .who { font: 600 10.5px "DM Sans", sans-serif; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; display: block; }

  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 28px 0 8px; }
  .mic-btn {
    width: 84px; height: 84px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--gradient-primary); color: #fff; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(37,99,235,0.35);
  }
  .mic-btn.recording { background: var(--danger); animation: pulse-ring 1.2s infinite; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); } 100% { box-shadow: 0 0 0 16px rgba(220,38,38,0); } }
  .mic-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .mic-hint { font: 500 13px "DM Sans", sans-serif; color: var(--text-muted); }

  .sms-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%);
    background: #1d1d1f; color: #fff; padding: 14px 18px; border-radius: 16px;
    display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transition: transform 0.3s ease; max-width: 90vw; z-index: 10;
  }
  .sms-toast.show { transform: translateX(-50%) translateY(0); }
  .sms-toast a { color: #93c5fd; font-weight: 700; }
</style>
</head>
<body>
<div class="page call-page">
  <div class="call-top">
    <div class="logo-lockup" id="logo"></div>
    <div class="status-chip">
      <span class="dot connecting" id="statusDot"></span>
      <span class="pill" id="langChip">Detecting…</span>
    </div>
  </div>

  <div class="card transcript-card" id="transcript">
    <div class="bubble assistant">
      <span class="who">Sampoorna Assistant</span>
      Hello, I'm the Sampoorna Health Secure assistant. Tap the microphone and speak — ask about cashless approval, reimbursement documents, or a claim decision.
    </div>
  </div>

  <div class="mic-area">
    <button class="mic-btn" id="micBtn">&#127908;</button>
    <div class="mic-hint" id="micHint">Tap to speak</div>
  </div>
</div>

<div class="sms-toast" id="smsToast">
  <span>&#128231; New message: documents needed for your claim.</span>
  <a href="#" id="smsLink">Open</a>
</div>

<script src="/static/js/logo.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/mic.js"></script>
<script>
  renderSarvamLogo(document.getElementById("logo"));

  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");
  if (!sessionId) window.location.href = "/static/index.html";

  const statusDot = document.getElementById("statusDot");
  const langChip = document.getElementById("langChip");
  const transcript = document.getElementById("transcript");
  const micBtn = document.getElementById("micBtn");
  const micHint = document.getElementById("micHint");
  const smsToast = document.getElementById("smsToast");
  const smsLink = document.getElementById("smsLink");

  let recorder = null;
  let recording = false;
  let busy = false;

  statusDot.classList.remove("connecting");

  function addBubble(who, text) {
    const div = document.createElement("div");
    div.className = `bubble ${who === "caller" ? "caller" : "assistant"}`;
    div.innerHTML = `<span class="who">${who === "caller" ? "You" : "Sampoorna Assistant"}</span>${text}`;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function showSmsToast() {
    smsToast.classList.add("show");
    smsLink.href = `/static/upload.html?session_id=${sessionId}`;
  }

  async function handleTurnResult(result) {
    langChip.textContent = languageLabel(result.detected_language);
    addBubble("caller", result.transcript);
    addBubble("assistant", result.assistant_text);
    playAudioBase64(result.assistant_audio);

    if (result.action === "REQUEST_DOCUMENT") {
      showSmsToast();
    } else if (result.action === "ESCALATE") {
      setTimeout(() => {
        window.location.href = `/static/escalation.html?session_id=${sessionId}`;
      }, 1500);
    }
  }

  async function toggleMic() {
    if (busy) return;
    if (!recording) {
      try {
        recorder = new MicRecorder();
        await recorder.start();
      } catch (err) {
        micHint.textContent = "Microphone access is needed to talk. Please allow it and try again.";
        return;
      }
      recording = true;
      micBtn.classList.add("recording");
      micBtn.textContent = "⏹";
      micHint.textContent = "Listening… tap again to stop";
    } else {
      recording = false;
      busy = true;
      micBtn.classList.remove("recording");
      micBtn.textContent = "⏳";
      micBtn.disabled = true;
      micHint.textContent = "Thinking…";
      try {
        const blob = await recorder.stop();
        const result = await Api.sendTurn(sessionId, blob);
        await handleTurnResult(result);
      } catch (err) {
        micHint.textContent = "Something went wrong. Please try again.";
      } finally {
        busy = false;
        micBtn.disabled = false;
        micBtn.textContent = "\u{1F3A4}";
        micHint.textContent = "Tap to speak";
      }
    }
  }

  micBtn.addEventListener("click", toggleMic);
</script>
</body>
</html>
